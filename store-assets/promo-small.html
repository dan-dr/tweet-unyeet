<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 440px;
      height: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f1419, #1d9bf0 180%);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 32px;
    }
    h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 8px; }
    p { font-size: 14px; line-height: 1.4; color: #e7e9ea; max-width: 320px; }
    .tag { margin-top: 16px; font-size: 12px; font-weight: 600; color: #1d9bf0; }
  </style>
</head>
<body>
  <h1>Tweet Unyeet</h1>
  <p>Save tweets you've scrolled past before they vanish from your feed.</p>
  <div class="tag">Local · Private · Searchable</div>
</body>
</html>
